<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUH-JED</title>
    <!-- Firebase Initialization -->
    <script src="https://www.gstatic.com/firebasejs/8.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.0.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.0.0/firebase-database.js"></script>

    <!-- Google Calendar API Script -->
    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        function handleAuthClick(event) {
            gapi.auth2.getAuthInstance().signIn().then(function() {
                // After successful sign-in, you can proceed to add events
            }).catch(function(error) {
                console.error("Error during Google authentication:", error);
            });
        }

        function addToGoogleCalendar(eventDetails) {
            const { summary, location, description, startDateTime, endDateTime } = eventDetails;
            const event = {
                'summary': summary,
                'location': location,
                'description': description,
                'start': {
                    'dateTime': startDateTime,
                    'timeZone': 'UTC',
                },
                'end': {
                    'dateTime': endDateTime,
                    'timeZone': 'UTC',
                },
            };

            const request = gapi.client.calendar.events.insert({
                'calendarId': 'primary',
                'resource': event,
            });

            request.execute(function(event) {
                if (event.htmlLink) {
                    console.log('Event created: ' + event.htmlLink);
                } else {
                    console.error('Error creating event:', event);
                }
            });
        }
    </script>
</head>
<body>
    <div id="next-trip-banner">
        <h1>Your Next Trip</h1>
        <!-- Other trip details here -->
        <button onclick="addToGoogleCalendar(eventDetails)">🗓️ Add to Calendar</button>
    </div>
</body>
</html>
